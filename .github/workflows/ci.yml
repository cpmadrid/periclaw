name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  ci:
    name: fmt + clippy + test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: ./dev ci
        run: ./dev ci

  build-macos:
    name: build-release (macos-14)
    runs-on: macos-14
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # build number = git commit count

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-

      - name: ./dev build --release
        run: ./dev build --release

      - name: Upload periclaw binary
        uses: actions/upload-artifact@v4
        with:
          name: periclaw-macos-arm64
          path: target/release/periclaw
          if-no-files-found: error
          retention-days: 7
